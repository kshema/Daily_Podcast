name: Daily News Digest

on:
  workflow_dispatch:
  schedule:
    # 5:00 AM America/New_York during daylight saving time.
    # GitHub cron uses UTC. Change to "0 10 * * *" during standard time if needed.
    - cron: "0 9 * * *"

jobs:
  send-digest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: openai
      OPENAI_MODEL: gpt-5.5

      ENABLE_EMAIL: "true"
      ENABLE_AUDIO: "false"

      GMAIL_CREDENTIALS_FILE: secrets/google_oauth_client.json
      GMAIL_TOKEN_FILE: secrets/token.json
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      PODCAST_OUTPUT_DIR: output

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore Gmail credentials
        run: |
          mkdir -p secrets
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > secrets/google_oauth_client.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}' > secrets/token.json

      - name: Generate and send digest
        run: daily-podcast run
